<table mat-table [dataSource]="strategies()">

    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <ng-container matColumnDef="instrument">
        <th mat-header-cell *matHeaderCellDef> Instrument </th>
        <td mat-cell *matCellDef="let element"> {{element.instrument}} </td>
    </ng-container>

    <ng-container matColumnDef="timeframe">
        <th mat-header-cell *matHeaderCellDef> Timeframe </th>
        <td mat-cell *matCellDef="let element"> {{element.timeframe}} </td>
    </ng-container>

    <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element" [class.active]="element.status === 'Active'"
            [class.inactive]="element.status === 'Inactive'"> {{element.status}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
